<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>EduVerse – Materials</title>
	<link rel="stylesheet" href="../css/styles.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
	<div class="layout">
		<aside class="sidebar">
			<div class="brand" style="margin: 6px 6px 12px;">
				<img src="../assets/logo.svg" class="logo" alt="EduVerse" />
				<h1>EduVerse</h1>
			</div>
			<h3 id="roleTitle">Materials</h3>
			<nav class="menu" id="roleMenu"></nav>
		</aside>
		<main class="content">
			<h2 class="page-title" id="pageTitle">Materials</h2>
			<p class="page-subtitle" id="pageSubtitle"></p>

			<section class="card" id="uploadSection" style="display:none;">
				<h3 style="margin-top:0;">Upload Material (Simulated)</h3>
				<form class="form" id="uploadForm">
					<div class="field"><label>Course</label>
						<select id="courseSelect"></select>
					</div>
					<div class="field"><label>Title</label><input type="text" id="matTitle" required /></div>
					<div class="field"><label>Description</label><textarea id="matDesc" rows="3"></textarea></div>
					<div class="field"><label>File</label><input type="file" id="matFile" /></div>
					<button class="btn primary" type="submit">Upload</button>
				</form>
			</section>

			<section class="card" style="margin-top:16px;">
				<h3 style="margin-top:0;">Available Materials</h3>
				<table>
					<thead><tr><th>Course</th><th>Title</th><th>Description</th><th>File</th></tr></thead>
					<tbody id="matTable"></tbody>
				</table>
			</section>
		</main>
	</div>

	<script src="../js/data.js"></script>
	<script src="../js/main.js"></script>
	<script>
		const user = EduVerse.getUser();
		const role = (user && user.role) || 'Student';
		document.getElementById('roleTitle').textContent = role;
		const roleMenu = document.getElementById('roleMenu');
		const matTable = document.getElementById('matTable');
		const uploadSection = document.getElementById('uploadSection');
		const pageTitle = document.getElementById('pageTitle');
		const pageSubtitle = document.getElementById('pageSubtitle');

		function buildMenu(){
			const m = [];
			if(role==='Student'){
				m.push(['./student-dashboard.html','Dashboard']);
				m.push(['./courses.html','Enroll in Course']);
				m.push(['./materials.html','Course Materials']);
				m.push(['./attendance.html','Performance & Attendance']);
			}else if(role==='Teacher'){
				m.push(['./teacher-dashboard.html','Dashboard']);
				m.push(['./materials.html','Upload Materials']);
				m.push(['./attendance.html','Mark Attendance']);
				m.push(['./courses.html','Track Performance']);
			}else{
				m.push(['./admin-dashboard.html','Dashboard']);
				m.push(['./courses.html','Courses']);
				m.push(['./materials.html','Reports']);
				m.push(['./attendance.html','Schedule']);
			}
			roleMenu.innerHTML = '';
			for(const [href,label] of m){
				const a = document.createElement('a'); a.href = href; a.textContent = label; if(label.includes('Material')||label==='Reports') a.classList.add('active'); roleMenu.appendChild(a);
			}
		}

		function renderMaterials(){
			matTable.innerHTML = '';
			const enroll = (role==='Student' && user) ? EduData.listStudentEnrollments(user.id) : new Set(EduData.courses.map(c=>c.id));
			for(const c of EduData.courses){
				if(!enroll.has(c.id)) continue;
				const items = EduData.materialsByCourse[c.id] || [];
				for(const m of items){
					const tr = document.createElement('tr');
					tr.innerHTML = `<td>${c.code}</td><td>${m.title}</td><td>${m.description}</td><td><span class='badge info'>${m.file}</span></td>`;
					matTable.appendChild(tr);
				}
			}
		}

		function initUpload(){
			if(role!=='Teacher'){ uploadSection.style.display='none'; pageTitle.textContent='Course Materials'; pageSubtitle.textContent='View materials for your enrolled courses.'; return; }
			uploadSection.style.display='block'; pageTitle.textContent='Upload Materials'; pageSubtitle.textContent='Add resources for your classes (simulation).';
			const sel = document.getElementById('courseSelect');
			const mine = EduData.courses.filter(c=>c.teacherId===user.id);
			for(const c of mine){ const opt = document.createElement('option'); opt.value = c.id; opt.textContent = `${c.code} – ${c.title}`; sel.appendChild(opt); }
			document.getElementById('uploadForm').addEventListener('submit', (e)=>{
				e.preventDefault();
				const cid = Number(sel.value); const title = document.getElementById('matTitle').value.trim(); const desc = document.getElementById('matDesc').value.trim(); const file = document.getElementById('matFile').value.split('\\').pop() || 'uploaded.pdf';
				if(!title){ EduVerse.showToast('Title required','warn'); return; }
				EduData.materialsByCourse[cid] = EduData.materialsByCourse[cid] || [];
				EduData.materialsByCourse[cid].push({ id: 'm'+Math.random().toString(36).slice(2,7), title, description: desc, file });
				EduVerse.showToast('Uploaded (simulated)','success');
				renderMaterials();
				(e.target).reset();
			});
		}

		buildMenu();
		initUpload();
		renderMaterials();
	</script>
</body>
</html>
