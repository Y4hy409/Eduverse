<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>EduVerse – Admin Dashboard</title>
	<link rel="stylesheet" href="../css/styles.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
	<div class="layout">
		<aside class="sidebar">
			<div class="brand" style="margin: 6px 6px 12px;">
				<img src="../assets/logo.svg" class="logo" alt="EduVerse" />
				<h1>EduVerse</h1>
			</div>
			<h3>Admin</h3>
			<nav class="menu">
				<a class="active" href="#">Dashboard</a>
				<a href="./courses.html">Courses</a>
				<a href="./materials.html">Reports</a>
				<a href="./attendance.html">Schedule</a>
				<a href="./login.html">Logout</a>
			</nav>
		</aside>
		<main class="content">
			<h2 class="page-title">Admin Console</h2>
			<p class="page-subtitle">Manage students, teachers, courses, and schedules.</p>

			<section class="stat-cards">
				<div class="stat-card">
					<p class="stat-title">Students</p>
					<p class="stat-value" id="scount">0</p>
					<div class="nav" style="margin-top:8px;">
						<a class="btn" href="#" id="gotoStudents">Manage</a>
					</div>
				</div>
				<div class="stat-card">
					<p class="stat-title">Teachers</p>
					<p class="stat-value" id="tcount">0</p>
					<div class="nav" style="margin-top:8px;">
						<a class="btn" href="#" id="gotoTeachers">Manage</a>
					</div>
				</div>
				<div class="stat-card">
					<p class="stat-title">Courses</p>
					<p class="stat-value" id="ccount">0</p>
					<div class="nav" style="margin-top:8px;">
						<a class="btn" href="./courses.html">Manage</a>
					</div>
				</div>
				<div class="stat-card">
					<p class="stat-title">Schedule</p>
					<p class="stat-value">Week</p>
					<div class="nav" style="margin-top:8px;">
						<a class="btn" href="./attendance.html">View</a>
					</div>
				</div>
			</section>

			<section class="card" style="margin-top:16px;">
				<h3 style="margin-top:0;">Quick Actions</h3>
				<div class="nav">
					<button class="btn" id="addStudent">Add Student</button>
					<button class="btn" id="addTeacher">Add Teacher</button>
					<button class="btn" id="addCourse">Add Course</button>
				</div>
			</section>
		</main>
	</div>

	<script src="../js/data.js"></script>
	<script src="../js/main.js"></script>
	<script>
		EduVerse.ensureRole('Admin');
		document.getElementById('scount').textContent = EduData.students.length;
		document.getElementById('tcount').textContent = EduData.teachers.length;
		document.getElementById('ccount').textContent = EduData.courses.length;

		document.getElementById('addStudent').onclick = () => EduVerse.showToast('Simulated: new student form', 'info');
		document.getElementById('addTeacher').onclick = () => EduVerse.showToast('Simulated: new teacher form', 'info');
		document.getElementById('addCourse').onclick = () => EduVerse.showToast('Simulated: new course form', 'info');
		document.getElementById('gotoStudents').onclick = () => EduVerse.routeTo('./courses.html#students');
		document.getElementById('gotoTeachers').onclick = () => EduVerse.routeTo('./courses.html#teachers');
	</script>
</body>
</html>
