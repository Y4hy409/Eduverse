<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>EduVerse – Teacher Dashboard</title>
	<link rel="stylesheet" href="/css/styles.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
	<div class="layout">
		<aside class="sidebar">
			<div class="brand" style="margin: 6px 6px 12px;">
				<img src="/assets/logo.svg" class="logo" alt="EduVerse" />
				<h1>EduVerse</h1>
			</div>
			<h3>Teacher</h3>
			<nav class="menu">
				<a class="active" href="#">Dashboard</a>
				<a href="/pages/materials.html">Upload Materials</a>
				<a href="/pages/attendance.html">Mark Attendance</a>
				<a href="/pages/courses.html">Track Performance</a>
				<a href="/pages/login.html">Logout</a>
			</nav>
		</aside>
		<main class="content">
			<h2 class="page-title">Welcome, <span id="teacherName"></span></h2>
			<p class="page-subtitle">Your assigned courses and quick actions.</p>

			<section class="card" style="margin-top:16px;">
				<h3 style="margin-top:0;">Assigned Courses</h3>
				<table>
					<thead><tr><th>Code</th><th>Title</th><th>Credits</th></tr></thead>
					<tbody id="tCourseRows"></tbody>
				</table>
			</section>
		</main>
	</div>

	<script src="/js/data.js"></script>
	<script src="/js/main.js"></script>
	<script>
		const user = EduVerse.ensureRole('Teacher');
		document.getElementById('teacherName').textContent = user.name;
		const myCourses = EduData.courses.filter(c => c.teacherId === user.id);
		const tbody = document.getElementById('tCourseRows');
		for (const c of myCourses) {
			const tr = document.createElement('tr');
			tr.innerHTML = `<td>${c.code}</td><td>${c.title}</td><td>${c.credits}</td>`;
			tbody.appendChild(tr);
		}
	</script>
</body>
</html>
